<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1f3b57">
<title>ICMDA 2026 숙소배정 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --byytc:#fff2cc; --byytc-b:#e0c200;
    --youus:#dbe9f5; --youus-b:#5b8fc9;
    --booyoung:#f3e2d2; --booyoung-b:#c08b55;
    --pool:#f0f0f0; --warn:#c00000; --ok:#2e7d32;
    --line:#ccc;
  }
  *{box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Pretendard","Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;margin:0;background:#f7f7f9;color:#222;font-size:13px;-webkit-text-size-adjust:100%;}
  header{background:#1f3b57;color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
  header h1{font-size:16px;margin:0 12px 0 0;font-weight:600;}
  header .spacer{flex:1;}
  button,label.btn{background:#3a6ea5;color:#fff;border:none;border-radius:5px;padding:6px 11px;font-size:12px;cursor:pointer;}
  button:hover,label.btn:hover{background:#2c597f;}
  button.alt{background:#5a6b7b;}
  button.go{background:#2e7d32;}
  button:disabled{background:#9aa6b1;cursor:not-allowed;}
  :focus-visible{outline:2px solid #8fc0ff;outline-offset:1px;}
  header .tbdiv{width:1px;align-self:stretch;background:rgba(255,255,255,.25);margin:2px 4px;}
  header .toolbtns{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  input[type=file]{display:none;}
  #statsbar{display:flex;gap:14px;flex-wrap:wrap;padding:8px 16px;background:#fff;border-bottom:1px solid var(--line);font-size:12px;align-items:center;}
  #statsbar .stat b{font-size:15px;}
  #statsbar .stat{padding:2px 8px;border-right:1px solid #eee;}
  .pill{display:inline-block;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:600;}
  .pill.warn{background:#fde0e0;color:var(--warn);}
  .pill.ok{background:#e3f3e4;color:var(--ok);}
  #main{display:flex;gap:12px;padding:12px;align-items:flex-start;}
  #pool{width:260px;flex:none;background:var(--pool);border:1px solid var(--line);border-radius:8px;padding:8px;position:sticky;top:calc(var(--headerh,52px) + 6px);max-height:calc(100vh - var(--headerh,52px) - 16px);overflow:auto;}
  #pool h2{font-size:13px;margin:2px 0 6px;}
  #pool input.search{width:100%;padding:5px;margin-bottom:6px;border:1px solid var(--line);border-radius:4px;}
  #venues{flex:1;display:flex;flex-direction:column;gap:18px;min-width:0;}
  .venue{border:1px solid var(--line);border-radius:8px;background:#fff;}
  .venue>h2{margin:0;padding:8px 12px;border-radius:8px 8px 0 0;font-size:14px;display:flex;align-items:center;gap:10px;}
  .venue.byytc>h2{background:var(--byytc);border-bottom:2px solid var(--byytc-b);}
  .venue.youus>h2{background:var(--youus);border-bottom:2px solid var(--youus-b);}
  .venue.booyoung>h2{background:var(--booyoung);border-bottom:2px solid var(--booyoung-b);}
  .venue>h2 .cap{font-size:12px;font-weight:500;}
  .floorgrp{padding:6px 10px;}
  .floorgrp h3{font-size:12px;color:#555;margin:8px 2px 4px;border-bottom:1px dashed #ddd;}
  .rooms{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:8px;}
  .room{border:1px solid var(--line);border-radius:8px;padding:5px 6px;background:#fafafa;min-height:62px;}
  .room.over{border-color:var(--warn);background:#fff5f5;}
  .room .rhdr{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#444;margin-bottom:3px;gap:4px;}
  .room .rno{font-weight:700;color:#111;}
  .room .tags{display:flex;gap:3px;flex-wrap:wrap;}
  .tag{font-size:9px;padding:0 4px;border-radius:3px;border:1px solid #bbb;background:#fff;}
  .tag.M{background:#e6f0fb;border-color:#9cc;} .tag.F{background:#fde9f1;border-color:#d9a;}
  .tag.ondol{background:#fff0c8;border-color:#d4a;}
  .tag.staff{background:#eee;}
  .capbadge{font-weight:700;}
  .capbadge.over{color:var(--warn);} .capbadge.full{color:#b8860b;} .capbadge.ok{color:var(--ok);}
  .chip{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 5px;margin:2px 0;border-radius:4px;background:#eef2f6;border:1px solid #d6dee6;cursor:grab;}
  .chip.sex-M{border-left:3px solid #3a6ea5;} .chip.sex-F{border-left:3px solid #c2557a;} .chip.sex-q{border-left:3px solid #999;}
  .chip.mix{border-left:3px solid #8a6; }
  .chip.locked{background:#fff7df;}
  .chip .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .chip .hc{color:#666;font-size:10px;}
  .chip .lk{cursor:pointer;font-size:11px;}
  .chip.badmatch{outline:1.5px solid var(--warn);}
  .chip .grp{font-size:9px;color:#a60;}
  /* tap-to-assign: picked chip, room drop-target cue, hint banner */
  .chip.picked{outline:2px solid var(--ok);box-shadow:0 0 0 2px #b6e0b8;background:#eef7ee;}
  #venues.picking .room{outline:1px dashed #79b27c;cursor:pointer;}
  #venues.picking .room:hover{outline:2px solid var(--ok);background:#f1f8f1;}
  .pickhint{background:#e9f6ea;border:1px solid #b6e0b8;color:#256a2a;font-size:11px;font-weight:600;padding:5px 8px;border-radius:6px;margin-bottom:6px;line-height:1.35;}
  #warnpanel{padding:6px 16px;background:#fff8f8;border-top:1px solid #f0d0d0;font-size:12px;max-height:130px;overflow:auto;}
  #warnpanel h3{margin:0 0 4px;font-size:12px;color:var(--warn);position:sticky;top:0;background:#fff8f8;padding:4px 0;display:flex;gap:6px;align-items:center;z-index:1;}
  #warnpanel .warnnote{color:#777;font-size:11px;margin:0 0 4px;}
  #warnpanel li{margin:1px 0;line-height:1.45;}
  .empty-hint{color:#888;padding:30px;text-align:center;}
  .muted{color:#888;font-size:11px;}
  /* ④ category badge on chips */
  .chip .cat{font-size:10px;font-weight:700;color:#fff;padding:0 6px;border-radius:999px;flex:none;letter-spacing:.2px;}
  .chip .sx{flex:none;font-size:10px;font-weight:700;padding:0 4px;border-radius:999px;background:#fff;border:1px solid #ccc;}
  .chip.sex-M .sx{color:#2c5a8c;border-color:#aac4e0;} .chip.sex-F .sx{color:#a8456c;border-color:#e0aac4;}
  .chip.mix .sx{color:#6a8a3a;border-color:#c0d49a;} .chip.sex-q .sx{color:#777;}
  .chip{border-left-width:4px;}
  /* view tabs */
  .viewtabs{display:inline-flex;gap:4px;margin-right:10px;}
  .vtab{background:#27496b;}
  .vtab.active{background:#fff;color:#1f3b57;font-weight:700;}
  /* ②③④ timeline — compact, hotel-split, right buffer */
  /* #timeline is now a flex column wrapper; #gantt is the actual both-axis
     scroller (so frozen columns + sticky date header resolve against it and
     the edge-fade overlays can pin to the non-scrolling #ganttwrap). */
  #timeline{padding:8px 14px;display:flex;flex-direction:column;min-height:0;
            height:calc(100vh - var(--topoff,92px));height:calc(100dvh - var(--topoff,92px));}
  #ganttwrap{position:relative;flex:1;min-height:0;display:flex;}
  #gantt{overflow:auto;flex:1;min-width:0;}
  #tlcards{flex:1;min-height:0;}
  #timeline.cardmode #ganttwrap{display:none;}
  #timeline.cardmode #tlcards{display:block;overflow:auto;}
  #tlbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
  #tlbar .search{width:160px;margin:0;max-width:60vw;}
  #tlbar select{padding:4px;border:1px solid var(--line);border-radius:4px;}
  #tlhead,.tlrow{display:grid;grid-template-columns:var(--tlcols,56px 58px 150px 78px 84px 52px minmax(260px,1fr));align-items:center;}
  #tlhead{position:sticky;top:0;background:#f7f7f9;z-index:10;border-bottom:2px solid #bbb;font-size:10px;font-weight:700;}
  .tlrow .idc{font-family:ui-monospace,Consolas,monospace;font-size:10px;color:#667;padding:0 5px;text-align:center;white-space:nowrap;overflow:hidden;border-right:1px solid #eee;}
  .tlrow .catc{padding:0 4px;text-align:center;overflow:hidden;border-right:1px solid #eee;white-space:nowrap;}
  .tlrow .venc{padding:0 4px;text-align:center;overflow:hidden;border-right:1px solid #eee;white-space:nowrap;}
  .tlrow .roomc{padding:0 4px;text-align:center;overflow:hidden;border-right:1px solid #eee;white-space:nowrap;}
  .tlrow .capc{padding:0 4px;text-align:center;border-right:1px solid #eee;white-space:nowrap;}
  .tlrow .pill{display:inline-block;vertical-align:middle;height:16px;line-height:16px;font-size:10px;font-weight:700;padding:0 8px;border-radius:999px;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
  /* informational pills are quiet/neutral — colour is reserved for status (warn/ok/dup/over) */
  .tlrow .pill.ven{background:#eef0f2;color:#5a6470;font-weight:600;}
  .tlrow .rnum{font-size:12px;font-weight:700;color:#283544;}
  .tlrow .rnum.none{font-size:11px;font-weight:600;color:#8a929c;}
  .tlrow .pill.cap{background:#eef0f2;color:#5a6470;font-weight:600;}
  .tlrow .pill.none{background:#f0f1f3;color:#6b7480;font-weight:600;}
  .tlrow.dropmark{box-shadow:inset 0 2px 0 0 #3a6ea5;}
  #tlhead .nights,.tlrow .track{display:grid;grid-template-columns:repeat(var(--ncols),1fr);}
  #tlhead .nights div{padding:3px 1px;text-align:center;border-left:1px solid #e3e3e3;}
  #tlhead .nights div.unofficial{background:#f3e6e6;color:#a55;}
  #tlhead .nights div.buffer{background:#eef1f4;color:#5a6675;}
  #tlhead .lbl{padding:3px 6px;position:relative;align-self:stretch;display:flex;align-items:center;}
  #tlhead .lbl.ctr{justify-content:center;}
  #tlhead .lbl .colgrip{position:absolute;top:0;right:-3px;width:7px;height:100%;cursor:col-resize;z-index:5;touch-action:none;}
  #tlhead .lbl .colgrip:hover,#tlhead .lbl .colgrip.drag{background:rgba(58,110,165,.35);}
  /* hotel split band */
  .tlgroup{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;position:sticky;top:var(--tlheadh,24px);z-index:9;font-size:11px;font-weight:700;padding:5px 10px;margin-top:4px;
           border-top:2px solid rgba(0,0,0,.18);border-bottom:1px solid rgba(0,0,0,.12);transition:filter .12s,box-shadow .12s;}
  .tlgroup:hover{filter:brightness(1.05);box-shadow:inset 0 0 0 2px rgba(58,110,165,.5);}
  .tlgroup .chev{display:inline-block;width:12px;text-align:center;font-size:10px;transition:transform .15s;}
  .tlgroup .chev.open{transform:rotate(90deg);}
  .tlgroup .ghint{margin-left:auto;font-size:10px;font-weight:600;color:#1f3b57;background:rgba(255,255,255,.6);padding:1px 9px;border-radius:999px;opacity:0;transition:opacity .12s;}
  .tlgroup:hover .ghint{opacity:.95;}
  .tlgroup.byytc{background:var(--byytc);} .tlgroup.youus{background:var(--youus);}
  .tlgroup.booyoung{background:var(--booyoung);} .tlgroup.unassigned{background:#e9e9ec;color:#666;}
  .tlrow{border-bottom:1px solid #e8e8ec;}
  .tlrow.alt{background:#eef2f6;}                 /* stronger zebra (DESIGN-6) */
  .tlrow:hover{background:#f3f7fb;}
  /* frozen pane — ID·분류·이름 stay pinned to the left while the night axis scrolls */
  .tlrow .idc{position:sticky;left:0;z-index:4;background:#fff;}
  .tlrow .catc{position:sticky;left:var(--c1,56px);z-index:4;background:#fff;}
  .tlrow .who{position:sticky;left:var(--c2,114px);z-index:4;background:#fff;box-shadow:1px 0 0 0 #dcdce0;}
  .tlrow.alt .idc,.tlrow.alt .catc,.tlrow.alt .who{background:#eef2f6;}
  .tlrow:hover .idc,.tlrow:hover .catc,.tlrow:hover .who{background:#f3f7fb;}
  .tlrow.dup .idc,.tlrow.dup .catc,.tlrow.dup .who{background:#fff7e6;}
  .tlrow.dup:hover .idc,.tlrow.dup:hover .catc,.tlrow.dup:hover .who{background:#ffeecc;}
  #tlhead .lbl:nth-child(1){position:sticky;left:0;z-index:12;background:#f7f7f9;}
  #tlhead .lbl:nth-child(2){position:sticky;left:var(--c1,56px);z-index:12;background:#f7f7f9;}
  #tlhead .lbl:nth-child(3){position:sticky;left:var(--c2,114px);z-index:12;background:#f7f7f9;box-shadow:1px 0 0 0 #ccc;}
  .tlrow .who{display:flex;align-items:center;gap:4px;padding:1px 6px;overflow:hidden;cursor:pointer;font-size:11px;}
  .tlrow .who .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tlrow .who .tlgrip{flex:none;cursor:grab;color:#bbb;font-size:13px;line-height:1;padding:0 2px;touch-action:none;user-select:none;}
  .tlrow .who .tlgrip:active{cursor:grabbing;color:#3a6ea5;}
  .tlrow .cat{display:inline-block;vertical-align:middle;font-size:10px;font-weight:700;line-height:15px;color:#fff;padding:0 7px;border-radius:999px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tlrow.dup{background:#fff7e6;}
  .tlrow.dup:hover{background:#ffeecc;}
  .tlrow .dupflag{margin-left:4px;font-size:10px;color:#c47f00;cursor:help;flex:none;}
  .tlrow .track{position:relative;height:17px;background:
     repeating-linear-gradient(to right,transparent,transparent calc(100%/var(--ncols) - 1px),#ececec calc(100%/var(--ncols) - 1px),#ececec calc(100%/var(--ncols)));}
  .tlrow .track .unoff{position:absolute;top:0;bottom:0;background:#f7ecec;}
  .tlrow .track .bufz{position:absolute;top:0;bottom:0;background:#eef1f4;}
  .bar{position:absolute;top:2px;height:13px;border-radius:3px;display:flex;align-items:center;justify-content:center;
       color:#fff;font-size:9px;font-weight:700;cursor:grab;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.25);z-index:2;touch-action:none;}
  .bar .h{position:absolute;top:0;bottom:0;width:7px;cursor:ew-resize;}
  .bar .h.l{left:-1px;} .bar .h.r{right:-1px;}
  .bar.none{background:#cfcfcf !important;cursor:default;color:#333;font-weight:500;}
  /* ⑤ detail modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;}
  .card{background:#fff;border-radius:10px;max-width:560px;width:92%;max-height:86vh;overflow:auto;box-shadow:0 10px 40px rgba(0,0,0,.3);}
  .card .chead{padding:12px 16px;color:#fff;display:flex;align-items:center;gap:10px;border-radius:10px 10px 0 0;}
  .card .chead h2{margin:0;font-size:17px;} .card .chead .sub{opacity:.9;font-size:12px;}
  .card .cedit{margin-left:auto;cursor:pointer;font-size:12px;font-weight:700;color:#fff;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.6);border-radius:6px;padding:3px 11px;}
  .card .cedit:hover{background:rgba(255,255,255,.4);}
  .card .cx{margin-left:auto;cursor:pointer;font-size:20px;line-height:1;background:none;border:none;color:#fff;padding:0 4px;}
  .card .cbody{padding:12px 16px;display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:13px;}
  .card .cbody .k{color:#777;white-space:nowrap;} .card .cbody .v{word-break:break-word;}
  .card .cbody.edit{align-items:center;gap:6px 12px;}
  .card .cbody.edit .k{font-size:12px;}
  .card .cbody.edit input,.card .cbody.edit select,.card .cbody.edit textarea{width:100%;box-sizing:border-box;font:inherit;font-size:13px;padding:3px 6px;border:1px solid var(--line);border-radius:5px;background:#fff;}
  .card .cbody.edit textarea{resize:vertical;}
  .card .cfoot{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid #eee;position:sticky;bottom:0;background:#fff;border-radius:0 0 10px 10px;}
  .card .cfoot button{padding:6px 16px;}
  .card .sec{grid-column:1/-1;margin:8px 0 2px;font-weight:700;color:#1f3b57;border-bottom:1px solid #eee;}
  /* loading overlay */
  #loading{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#1f3b57;font-weight:700;}
  #loading .spin{width:46px;height:46px;border:5px solid #cdd8e3;border-top-color:#3a6ea5;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* ===== toasts (non-blocking feedback, replaces alert) ===== */
  #toasts{position:fixed;left:50%;bottom:calc(16px + env(safe-area-inset-bottom));transform:translateX(-50%);
    z-index:520;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:92vw;pointer-events:none;}
  .toast{pointer-events:auto;min-width:200px;max-width:92vw;padding:10px 14px;border-radius:9px;color:#fff;font-size:13px;
    font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.28);display:flex;gap:10px;align-items:flex-start;animation:toastin .18s ease-out;transition:opacity .2s;}
  .toast .tmsg{white-space:pre-line;line-height:1.4;}
  .toast .tx{margin-left:auto;cursor:pointer;background:none;border:none;color:inherit;font-size:16px;line-height:1;padding:0 2px;min-height:auto;}
  .toast.info{background:#34557a;} .toast.ok{background:#256a2a;} .toast.warn{background:#9a5b00;} .toast.err{background:#b32d1f;}
  @media (max-width:640px){ #toasts{bottom:calc(74px + env(safe-area-inset-bottom));} }   /* clear the mobile action bar */
  @keyframes toastin{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  /* ===== confirm / info dialog — its own layer, above the detail modal & sheet ===== */
  #dlgbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:460;display:flex;align-items:center;justify-content:center;padding:16px;}
  #dlg{background:#fff;border-radius:11px;max-width:440px;width:100%;box-shadow:0 12px 44px rgba(0,0,0,.32);overflow:hidden;}
  #dlg .dh{padding:13px 16px;font-size:15px;font-weight:700;color:#1f3b57;border-bottom:1px solid #eee;}
  #dlg .db{padding:14px 16px;font-size:13px;line-height:1.55;white-space:pre-line;color:#333;max-height:58vh;overflow:auto;}
  #dlg .df{display:flex;gap:8px;justify-content:flex-end;padding:10px 16px;border-top:1px solid #eee;flex-wrap:wrap;}
  #dlg .df button{padding:8px 16px;min-height:44px;}
  /* ===== toolbar grouping (DESIGN-1): cluster actions by function ===== */
  .toolbtns{align-items:center;gap:6px;}
  .tgroup{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:8px;background:rgba(255,255,255,.07);}
  .tglabel{font-size:9px;font-weight:700;letter-spacing:.4px;color:rgba(255,255,255,.6);white-space:nowrap;}
  #btnMaster{background:#8a4b3a;}                         /* version-bump export — heavier action, set apart */
  #btnMaster:hover{background:#6f3a2c;}
  @media (max-width:1024px){ .tglabel{display:none;} }   /* reclaim header space on smaller widths */
  /* ===== stat bar (DESIGN-2): emphasis on the risk metric + fullness bars ===== */
  #statsbar .stat .frac{color:#9aa3ad;font-weight:600;}
  #statsbar .stat .bar{display:inline-block;width:54px;height:7px;border-radius:4px;background:#e6e8eb;overflow:hidden;vertical-align:middle;margin-left:6px;}
  #statsbar .stat .bar>i{display:block;height:100%;border-radius:4px;}
  #statsbar .stat .bar>i.ok{background:#2e7d32;} #statsbar .stat .bar>i.amber{background:#b8860b;} #statsbar .stat .bar>i.red{background:#c0392b;}
  #statsbar .stat.alert{background:#fde0e0;border-radius:7px;border-right:none;}
  #statsbar .stat.alert b{color:#b32d1f;font-size:18px;}
  #statsbar .stat.clear{background:#e3f3e4;border-radius:7px;border-right:none;}
  #statsbar .stat.clear b{color:#2e7d32;}
  /* ===== room-card chips (DESIGN-3): slim 1-char category badge + more name room ===== */
  .chip .cat{min-width:17px;padding:0 4px;text-align:center;flex:none;}
  .chip .nm{min-width:40px;}
  /* ===== category legend (DESIGN-4): collapsible color/letter key ===== */
  .legend{margin:0 0 6px;font-size:11px;border:1px solid var(--line);border-radius:6px;background:#fafbfc;}
  .legend>summary{cursor:pointer;color:#444;font-weight:600;padding:5px 8px;list-style:none;min-height:32px;display:flex;align-items:center;}
  .legend>summary::-webkit-details-marker{display:none;}
  .legend>summary::before{content:"▸";margin-right:6px;font-size:9px;}
  .legend[open]>summary::before{content:"▾";}
  .legendgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;padding:2px 8px 8px;}
  .legitem{display:flex;align-items:center;gap:5px;line-height:1.3;}
  .legbadge{min-width:17px;height:16px;line-height:16px;text-align:center;border-radius:999px;color:#fff;font-size:10px;font-weight:700;flex:none;}

  }

  /* phone layout: action bar, sheet, accordions, jump nav */
  @media (max-width:640px){
    /* fixed bottom action bar — two primary actions always visible + 더보기 */
    #mobilebar{display:flex;gap:8px;position:fixed;left:0;right:0;bottom:0;z-index:120;
      background:#1f3b57;padding:8px 10px;padding-bottom:max(8px,env(safe-area-inset-bottom));
      box-shadow:0 -2px 12px rgba(0,0,0,.28);}
    #mobilebar .mbtn{flex:1;min-height:48px;border:none;border-radius:9px;font-size:13px;font-weight:600;
      color:#fff;background:#3a6ea5;display:flex;align-items:center;justify-content:center;gap:5px;padding:0 6px;}

      animation:sheetup .18s ease-out;max-height:80vh;overflow:auto;}

    #sheet .sheet-grip{width:42px;height:4px;border-radius:2px;background:#cfd6dd;margin:4px auto 10px;}
    #sheet h3{margin:0 0 6px;font-size:14px;color:#1f3b57;}

      padding:0 14px;text-align:left;cursor:pointer;}

    /* sticky jump-to-floor control */

  /* print */

<script>
"use strict";
/* ============================================================
   ICMDA 2026 Room Assignment Dashboard (single file)
   - reads the live master .xlsx (columns mapped by HEADER NAME)
   - greedy auto-assign + manual drag/lock
   - export updated Excel + resume JSON; print one layout per hotel
   ============================================================ */

const VEN = {

// DESIGN-7: pick #fff or #111 for best contrast on a category colour (WCAG AA for the small badges)
function catText(hex){
  const m=/^#?([0-9a-fA-F]{6})$/.exec(hex||""); if(!m) return "#fff";
  const v=parseInt(m[1],16), lin=c=>{c/=255; return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4);};
  const L=0.2126*lin((v>>16)&255)+0.7152*lin((v>>8)&255)+0.0722*lin(v&255);
  return (1.05/(L+0.05)) >= ((L+0.05)/0.05) ? "#fff" : "#111";   // whichever yields more contrast
}

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const el = (t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
const norm = v => (v==null? "" : String(v).trim());
const isDate = h => /^\d+월\d+일$/.test(norm(h));

// long-press → fn (touch only; desktop keeps dblclick). Sets lpFired to swallow the trailing click.
let lpFired=false;
function attachLongPress(node, fn, ms=500){
  let timer=null, sx=0, sy=0;
  const clear=()=>{ if(timer){clearTimeout(timer); timer=null;} };
  node.addEventListener("pointerdown",e=>{
    if(e.pointerType==="mouse") return;            // mouse uses dblclick
    sx=e.clientX; sy=e.clientY;
    timer=setTimeout(()=>{ timer=null; lpFired=true; setTimeout(()=>lpFired=false,500); fn(); }, ms);
  });
  node.addEventListener("pointermove",e=>{ if(timer && (Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10)) clear(); });
  node.addEventListener("pointerup",clear);
  node.addEventListener("pointercancel",clear);
}

/* ---------- screen-reader live region ---------- */
function announce(msg){ const n=$("#live"); if(n) n.textContent=msg; }
// compose an action message + the current validation summary so a single
// announcement tells assistive tech both what happened and the new state.
function announceAssign(msg){
  let over=0; state.rooms.forEach(r=>{ if(roomLoad(r.key)>r.total) over++; });
  const un=state.parties.filter(p=>p.need!=="No"&&!state.assign[p.id]).reduce((s,p)=>s+p.hc,0);
  announce(`${msg}. 미배정 ${un}명, 정원초과 방 ${over}곳.`);
}
function dropLabel(key){
  if(key==="BOOY") return VEN.BOOY;
  const rm=state.roomById[key]; return rm?`${rm.rno||rm.id}호`:key;
}

/* ---------- toasts + confirm/info dialog (non-blocking feedback, replaces alert) ---------- */
function toast(msg, type="info", ms=3600){
  const wrap=$("#toasts"); if(!wrap){ announce(msg); return; }
  const t=el("div","toast "+type);
  t.setAttribute("role", type==="err"?"alert":"status");
  const m=el("span","tmsg",msg);
  const x=el("button","tx","×"); x.type="button"; x.setAttribute("aria-label","닫기");
  t.append(m,x); wrap.append(t);
  const kill=()=>{ t.style.opacity="0"; setTimeout(()=>t.remove(),200); };
  x.onclick=kill; if(ms) setTimeout(kill,ms);
  announce(msg);                                  // also route to the SR live region
}
// Confirm/info dialog. Pass onOk → confirm (확인/취소); omit onOk → info (확인 only).
function dialog({title, body, okText="확인", cancelText="취소", danger=false, onOk}){
  const bg=$("#dlgbg"), dl=$("#dlg");
  dl.innerHTML=`<div class="dh" id="dlgh">${esc(title)}</div><div class="db">${esc(body)}</div>`
    +`<div class="df">${onOk?`<button class="alt" id="dlgCancel">${esc(cancelText)}</button>`:""}`
    +`<button class="${danger?"":"go"}" id="dlgOk">${esc(okText)}</button></div>`;
  bg.style.display="flex";
  const close=()=>{ bg.style.display="none"; document.removeEventListener("keydown",onKey,true); };
  const ok=()=>{ close(); if(onOk) onOk(); };
  // capture phase so Esc/Enter here win over the page-level Esc handler
  const onKey=e=>{ if(e.key==="Escape"){ e.stopPropagation(); close(); } else if(e.key==="Enter"){ e.preventDefault(); ok(); } };
  document.addEventListener("keydown",onKey,true);
  bg.onclick=e=>{ if(e.target===bg) close(); };    // tap backdrop to dismiss (= cancel)
  $("#dlgOk").onclick=ok;
  const c=$("#dlgCancel"); if(c) c.onclick=close;
  $("#dlgOk").focus();
}

/* ============================================================
   Pointer-based drag assignment (replaces native HTML5 DnD,
   which never worked on touch). Works for mouse, pen, and
   finger. On touch the drag is initiated only from the chip's
   ⠿ grip, so the chip body stays tappable + the list scrollable.
   ============================================================ */
let dragFired=false;                 // set briefly after a real drag, to swallow the trailing click
const DRAG={pid:null, ghost:null, target:null, raf:null, vy:0, scn:null, lastXY:null};

function scrollParent(node){          // nearest vertically-scrollable ancestor (else null = window/page)
  for(let n=node; n && n!==document.body && n!==document.documentElement; n=n.parentElement){
    const s=getComputedStyle(n);
    if(/(auto|scroll)/.test(s.overflowY) && n.scrollHeight>n.clientHeight+2) return n;
  }
  return null;
}
function dragTargetUnder(x,y){        // a room card / pool list under the pointer (carries data-dropkey)
  let n=document.elementFromPoint(x,y);
  while(n && n!==document.body){ if(n.dataset && n.dataset.dropkey!=null) return n; n=n.parentElement; }
  return null;
}
function setDragTarget(t){
  if(t===DRAG.target) return;
  if(DRAG.target) DRAG.target.classList.remove("droptarget");
  DRAG.target=t; if(t) t.classList.add("droptarget");
}
function autoScrollTick(){            // scroll page / inner container while the pointer hugs an edge
  if(DRAG.pid==null){ DRAG.raf=null; return; }
  if(DRAG.vy){
    if(DRAG.scn) DRAG.scn.scrollTop+=DRAG.vy; else window.scrollBy(0,DRAG.vy);
    if(DRAG.lastXY) setDragTarget(dragTargetUnder(DRAG.lastXY[0],DRAG.lastXY[1]));
  }
  DRAG.raf=requestAnimationFrame(autoScrollTick);
}
function updateAutoScroll(x,y){
  const under=document.elementFromPoint(x,y);
  DRAG.scn=under?scrollParent(under):null;
  const EDGE=72, SPD=16;
  let top=0, bot=window.innerHeight;
  if(DRAG.scn){ const r=DRAG.scn.getBoundingClientRect(); top=r.top; bot=r.bottom; }
  if(y<top+EDGE) DRAG.vy=-Math.ceil(SPD*Math.min(1,(top+EDGE-y)/EDGE));
  else if(y>bot-EDGE) DRAG.vy=Math.ceil(SPD*Math.min(1,(y-(bot-EDGE))/EDGE));
  else DRAG.vy=0;
}
function applyDrop(pid,key){
  const p=state.byId[pid]; if(!p) return;
  if(key==="__pool__"){ delete state.assign[pid]; state.pick=null; render(); announceAssign(`${p.name} 미배정으로 이동`); }
  else { state.assign[pid]=key; state.pick=null; render(); announceAssign(`${p.name} ${dropLabel(key)} 배정`); }
}
// Begin a drag from `downEvt` for party `p`, visualised by cloning `chipNode`.
function beginDrag(downEvt, p, chipNode){
  const pid=downEvt.pointerId, capEl=downEvt.currentTarget;
  const sx=downEvt.clientX, sy=downEvt.clientY; let started=false;
  try{ capEl.setPointerCapture(pid); }catch(e){}
  const onMove=e=>{
    if(e.pointerId!==pid) return;
    if(!started){
      if(Math.abs(e.clientX-sx)<5 && Math.abs(e.clientY-sy)<5) return;   // movement threshold ⇒ it's a drag
      started=true; DRAG.pid=p.id;
      chipNode.classList.add("dragging");
      const g=chipNode.cloneNode(true); g.id="dragghost"; g.classList.remove("dragging");
      g.removeAttribute("role"); g.removeAttribute("tabindex");
      document.body.appendChild(g); DRAG.ghost=g;
      DRAG.raf=requestAnimationFrame(autoScrollTick);
      announce(`${p.name} 이동 중 — 방 위에 놓으세요`);
    }
    e.preventDefault();
    DRAG.lastXY=[e.clientX,e.clientY];
    if(DRAG.ghost){ DRAG.ghost.style.left=e.clientX+"px"; DRAG.ghost.style.top=e.clientY+"px"; }
    setDragTarget(dragTargetUnder(e.clientX,e.clientY));
    updateAutoScroll(e.clientX,e.clientY);
  };
  const finish=e=>{
    capEl.removeEventListener("pointermove",onMove);
    capEl.removeEventListener("pointerup",finish);
    capEl.removeEventListener("pointercancel",finish);
    try{ capEl.releasePointerCapture(pid); }catch(_){}
    if(!started) return;
    DRAG.vy=0; if(DRAG.raf){cancelAnimationFrame(DRAG.raf); DRAG.raf=null;}
    const tgt=DRAG.target; setDragTarget(null);
    chipNode.classList.remove("dragging");
    if(DRAG.ghost){ DRAG.ghost.remove(); DRAG.ghost=null; }
    DRAG.pid=null; DRAG.lastXY=null;
    dragFired=true; setTimeout(()=>dragFired=false,400);    // swallow the click that follows pointerup
    if(e.type!=="pointercancel" && tgt) applyDrop(p.id, tgt.dataset.dropkey);
  };
  capEl.addEventListener("pointermove",onMove);
  capEl.addEventListener("pointerup",finish);
  capEl.addEventListener("pointercancel",finish);
}

function headerMap(aoa){           // row index 1 (2nd row) holds headers
  const hdr = aoa[1]||[]; const m={};
  hdr.forEach((h,i)=>{ const k=norm(h); if(k) m[k]=i; });
  return m;
}

/* ---------- load master ---------- */
function loadMaster(arrbuf){
  const wb = XLSX.read(arrbuf,{type:"array",cellFormula:true,cellStyles:true});
  const pSheet = wb.Sheets["참가자"], rSheet = wb.Sheets["객실"];
  if(!pSheet||!rSheet){ toast("'참가자' 또는 '객실' 탭을 찾을 수 없습니다.","err",6000); return; }
  const pA = XLSX.utils.sheet_to_json(pSheet,{header:1,raw:true,defval:null});
  const rA = XLSX.utils.sheet_to_json(rSheet,{header:1,raw:true,defval:null});
  state.wb=wb; state.masterBuf=arrbuf;          // keep original workbook/bytes for versioned re-export
  state.edited=false;

  parseParticipants(pA);
  parseRooms(rA);
  // default assignment: respect 배정숙소 pre-locks
  state.assign={}; state.locked={};
  state.parties.forEach(p=>{
    if(p.pre.indexOf("부영호텔")>=0){ state.assign[p.id]="BOOY"; state.locked[p.id]=true; }
  });
  setActionsEnabled(true);
  populateFilters();
  render();
}
// enable/disable every action control (desktop toolbar + mobile bar + 더보기 sheet)
function setActionsEnabled(on){
  ["#btnAuto","#btnExcel","#btnJson","#btnPrint","#btnMaster",
   "#mbAuto","#shExcel","#shJson","#shPrint","#shMaster"].forEach(s=>{ const n=$(s); if(n) n.disabled=!on; });
}

function nextDay(label){                        // "6월30일" -> "7월1일"
  const m=/(\d+)월(\d+)일/.exec(label||""); if(!m) return "";
  let mo=+m[1], d=+m[2]+1; if(mo===6 && d>30){mo=7;d=1;} return `${mo}월${d}일`;
}
function parseParticipants(aoa){
  const H = headerMap(aoa); state.pH=H;
  const nightIdx = (aoa[1]||[]).map((h,i)=>({h:norm(h),i})).filter(o=>isDate(o.h));
  state.nightIdx = nightIdx;
  state.nightCols = nightIdx.map(o=>o.h);
  const NC = state.nightCols;
  // extended timeline axis: master nights + buffer days on the right (longer stays)
  const EXTRA_DAYS = 4;
  state.dates = NC.slice();
  for(let i=0;i<EXTRA_DAYS && state.dates.length;i++) state.dates.push(nextDay(state.dates[state.dates.length-1]));
  const g = (row,name)=> (H[name]!=null ? row[H[name]] : null);
  const parties=[];
  for(let r=2;r<aoa.length;r++){
    const row=aoa[r]; if(!row) continue;
    const id=norm(g(row,"참가자ID")); if(!id) continue;
    const party={본인:0,배우자:0,자녀:0,기타:0};
    ["본인","배우자","자녀","기타"].forEach(k=>{ const v=g(row,k); party[k]=(typeof v==="number")?v:(parseFloat(v)||0); });
    const partySum=party.본인+party.배우자+party.자녀+party.기타;
    const totCell=g(row,"총인원");                            // ① use 총인원 as headcount …
    let hc=(typeof totCell==="number"&&totCell>0)?totCell
          :(parseFloat(totCell)>0?parseFloat(totCell):partySum); // … fall back to party sum (identical when not cached)
    if(hc<=0) hc=1;
    // nights present + stay span (indices into nightCols)
    let s=null,e=null; const nights=[];
    nightIdx.forEach((o,k)=>{ if(norm(row[o.i])!==""){ nights.push(o.h); if(s===null)s=k; e=k; } });
    const sex=norm(g(row,"성별"))||"?";
    const isMulti = hc>1 || party.배우자>0 || party.자녀>0 || party.기타>0;
    parties.push({
      id, name:norm(g(row,"이름"))||id, kname:norm(g(row,"한글이름")),
      sex, partySex: isMulti?"MIX":(sex==="M"?"M":sex==="F"?"F":"?"),
      hc, party, partySum,
      need:norm(g(row,"배정필요"))||"Yes",
      cat:norm(g(row,"카테고리")), team:norm(g(row,"팀")), group:norm(g(row,"그룹ID")),
      pre:norm(g(row,"배정숙소")),
      stay:(s===null?null:{s,e}),
      arr:(s===null?"":NC[s]), dep:(e===null?"":nextDay(NC[e])),
      note:norm(g(row,"비고")), companions:norm(g(row,"동반자요약")), gubun:norm(g(row,"구분")),
      dob:norm(g(row,"생년월일")), nat:norm(g(row,"국적")), email:norm(g(row,"이메일")),
      aff:norm(g(row,"소속")), title:norm(g(row,"직책")), wb:norm(g(row,"WB등급")),
      pay:norm(g(row,"결제상태")), event:norm(g(row,"참가예정행사")), review:norm(g(row,"검토필요")),
      _row:r, _os:(s===null?null:{s,e}),       // sheet row index + original stay (for surgical export)
    });
  }
  state.parties=parties; state.byId={}; parties.forEach(p=>state.byId[p.id]=p);
  // default vertical order: by arrival night, then name
  state.orderList = parties.slice()
    .sort((a,b)=>(a.stay?a.stay.s:99)-(b.stay?b.stay.s:99)||a.name.localeCompare(b.name))
    .map(p=>p.id);
  state.collapsed={};
}
// stay helpers --------------------------------------------------------
function stayNights(p){ return p.stay ? (p.stay.e-p.stay.s+1) : 0; }
function refreshStay(p){                          // recompute arr/dep after a bar edit
  const D=state.dates;
  p.arr = p.stay ? D[p.stay.s] : "";
  p.dep = p.stay ? nextDay(D[p.stay.e]) : "";
}

function parseRooms(aoa){
  const H=headerMap(aoa); const rooms=[];
  for(let r=2;r<aoa.length;r++){
    const row=aoa[r]; if(!row) continue;
    const id=norm(row[H["객실ID"]]); const hotel=norm(row[H["숙소"]]);
    if(!id||!hotel) continue;
    const num = x => { const v=row[H[x]]; return (typeof v==="number")?v:(parseFloat(v)||0); };
    rooms.push({
      id, key:id, hotel,
      bldg:norm(row[H["동"]]), floor:norm(row[H["층"]]), rno:norm(row[H["호실"]]),
      type:norm(row[H["객실유형"]]), gender:norm(row[H["성별구분"]]),
      base:num("기준인원"), ext:num("추가인원"), total:num("총가능인원")||num("기준인원"),
      period:norm(row[H["이용가능기간"]]), ondol:norm(row[H["필수온돌"]])==="Y",
      note:norm(row[H["비고"]]),
    });
  }
  state.rooms=rooms; state.roomById={}; rooms.forEach(x=>state.roomById[x.key]=x);
}

/* ---------- assignment model ---------- */
function roomLoad(roomKey){
  let n=0; for(const pid in state.assign){ if(state.assign[pid]===roomKey) n+=state.byId[pid].hc; } return n;
}
function roomOccupants(roomKey){
  const out=[]; for(const pid in state.assign){ if(state.assign[pid]===roomKey) out.push(state.byId[pid]); }
  return out.sort((a,b)=>a.name.localeCompare(b.name));
}
function roomOccExcept(roomKey,pid){ return roomOccupants(roomKey).filter(o=>o.id!==pid); }
// realistic rule: a family (MIX) takes a whole room alone (label irrelevant);
// individuals must match the room's M/F label and never mix M & F strangers.
function compatible(room, party){               // HARD rule for auto-assign
  const occ=roomOccExcept(room.key,party.id);
  const load=occ.reduce((s,o)=>s+o.hc,0);
  if(load+party.hc>room.total) return false;
  const pf=party.partySex==="MIX", of=occ.some(o=>o.partySex==="MIX");
  if(occ.length && (pf||of)) return false;       // families never share
  if(pf) return occ.length===0;
  if(room.gender==="Staff") return false;        // reserve staff rooms for manual
  if(room.gender==="Male" && party.partySex==="F") return false;
  if(room.gender==="Female" && party.partySex==="M") return false;
  const sexes=new Set(occ.filter(o=>o.partySex==="M"||o.partySex==="F").map(o=>o.partySex));
  if(party.partySex==="M"||party.partySex==="F") sexes.add(party.partySex);
  return sexes.size<=1;
}
function matchIssue(room,party){                 // SOFT: message for warnings / highlight
  if(!room) return null;
  const occ=roomOccExcept(room.key,party.id);
  if(occ.reduce((s,o)=>s+o.hc,0)+party.hc>room.total) return "정원 초과";
  const pf=party.partySex==="MIX", of=occ.some(o=>o.partySex==="MIX");
  if(occ.length && (pf||of)) return "가족은 단독 사용";
  if(!pf){
    if(room.gender==="Male" && party.partySex==="F") return "남성방에 여성";
    if(room.gender==="Female" && party.partySex==="M") return "여성방에 남성";
    const sexes=new Set(occ.filter(o=>o.partySex==="M"||o.partySex==="F").map(o=>o.partySex));
    if(party.partySex==="M"||party.partySex==="F") sexes.add(party.partySex);
    if(sexes.size>1) return "남녀 혼숙";
  }
  return null;
}

/* ---------- greedy auto-assign (validated against v16 data) ----------
   Order: families first (big→small, need contiguous rooms), then teams,
   then single individuals (size-1 fillers) last so they pack leftover seats. */
const FAMTYPE=["Family","Triple","Suite"];
function autoAssign(){
  for(const pid in state.assign){ if(!state.locked[pid] && state.assign[pid]!=="BOOY") delete state.assign[pid]; }
  const prefVenue = p => p.pre.indexOf("유어스")>=0?VEN.YOUUS
        : (p.pre.indexOf("부영청소년")>=0||p.pre.indexOf("수련")>=0)?VEN.BYYTC : null;
  let units = state.parties.filter(p=> !state.locked[p.id] && !state.assign[p.id] && p.need!=="No");
  const rank = p => p.partySex==="MIX"?0 : p.team?1 : 2;
  units.sort((a,b)=>{
    const ra=rank(a),rb=rank(b); if(ra!==rb) return ra-rb;
    if(a.partySex==="MIX"||b.partySex==="MIX"){ if(b.hc!==a.hc) return b.hc-a.hc; } // big families first
    const ta=(a.team||a.group||""),tb=(b.team||b.group||""); if(ta!==tb) return ta.localeCompare(tb);
    return a.id.localeCompare(b.id);
  });
  units.forEach(p=>{
    const pv=prefVenue(p);
    let cands=state.rooms.filter(rm=>(!pv||rm.hotel===pv) && compatible(rm,p));
    if(!cands.length) cands=state.rooms.filter(rm=>compatible(rm,p));   // relax venue lock
    if(!cands.length) return;                                          // -> stays in pool
    const score = rm=>{
      const occ=roomOccupants(rm.key); let s=0;
      if(occ.length){
        if(occ.some(o=>o.group&&o.group===p.group)) s-=1000;
        if(occ.some(o=>o.team&&o.team===p.team)) s-=300;
      }
      if(p.team && rm.hotel===VEN.BYYTC) s-=40;
      if(p.partySex==="MIX"){
        if(FAMTYPE.some(t=>rm.type.indexOf(t)>=0)) s-=60;              // families → family-type first
        s+=(rm.total-p.hc)*4;                                         // tight room for the family
      }else{
        if(rm.ondol) s-=15;                                           // use mandatory ondol
        s+=(rm.total-(roomLoad(rm.key)+p.hc))*2;                      // best-fit (tight)
      }
      return s;
    };
    cands.sort((a,b)=>score(a)-score(b));
    state.assign[p.id]=cands[0].key;
  });
  render();
}

function renderStats(){
  const sb=$("#statsbar"); sb.innerHTML="";
  const total=state.parties.reduce((s,p)=>s+p.hc,0);
  const needP=state.parties.filter(p=>p.need!=="No").reduce((s,p)=>s+p.hc,0);
  const noRoom=state.parties.filter(p=>p.need==="No").reduce((s,p)=>s+p.hc,0);
  let assignedP=0, byBYYTC=0,byYOUUS=0,byBOOY=0, unassigned=0;
  state.parties.forEach(p=>{
    if(p.need==="No") return;
    const a=state.assign[p.id];
    if(!a){ unassigned+=p.hc; return; }
    assignedP+=p.hc;
    if(a==="BOOY") byBOOY+=p.hc;
    else { const rm=state.roomById[a]; if(rm){ if(rm.hotel===VEN.BYYTC)byBYYTC+=p.hc; else byYOUUS+=p.hc; } }
  });
  const capBYYTC=state.rooms.filter(r=>r.hotel===VEN.BYYTC).reduce((s,r)=>s+r.total,0);
  const capYOUUS=state.rooms.filter(r=>r.hotel===VEN.YOUUS).reduce((s,r)=>s+r.total,0);
  const pct=(u,c)=>c>0?Math.min(100,Math.round(u/c*100)):0;
  const lvl=(u,c)=> u>c?"red":(c>0&&u/c>=0.9)?"amber":"ok";          // green / amber(≥90%) / red(over)
  const mk=(label,val,extra)=>{const d=el("span","stat"); d.innerHTML=`${label} <b>${val}</b>${extra||""}`; return d;};
  // venue stat: consistent used/cap fraction + a fullness progress bar
  const venStat=(label,used,cap)=>mk(label,used,
    `<span class="frac">/${cap}</span><span class="bar" title="${pct(used,cap)}% 사용"><i class="${lvl(used,cap)}" style="width:${pct(used,cap)}%"></i></span>`);
  // 미배정 is the number a coordinator acts on → emphasised block (red when >0, green ✓ when clear)
  const un=el("span","stat "+(unassigned?"alert":"clear"));
  un.innerHTML = unassigned ? `미배정 <b>${unassigned}</b>명` : `미배정 <b>0</b> ✓`;
  sb.append(
    mk("총 인원",total),
    mk("방 필요",needP),
    mk("배정완료",assignedP,`<span class="frac">/${needP}</span>`),   // consistent fraction vs 방 필요
    un,
    mk("방 불필요",noRoom),
    venStat("부영수련원",byBYYTC,capBYYTC),
    venStat("유어스",byYOUUS,capYOUUS),
    mk("부영호텔(NOC)",byBOOY),
  );
  // surfaced warning badge → jumps to the detail warning panel (DESIGN-5)
  const issueN=state.rooms.length?computeIssues().length:0;
  const warn=el("span","stat warnjump"); warn.tabIndex=0; warn.setAttribute("role","button");
  warn.setAttribute("aria-label",`경고 ${issueN}건 — 경고 패널로 이동`);
  warn.innerHTML = issueN ? `<span class="pill warn">⚠ 경고 ${issueN}건</span>` : `<span class="pill ok">경고 0</span>`;
  warn.title="클릭하면 경고 패널로 이동합니다";
  warn.onclick=jumpToWarnings;
  warn.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); jumpToWarnings(); } };
  sb.append(warn);
  updateStatsFades();
}

// short ARIA description: name · sex · headcount · where assigned · picked?
function ariaForChip(p){
  const sex=p.partySex==="MIX"?"가족":p.partySex==="M"?"남성":p.partySex==="F"?"여성":"성별미상";
  const a=state.assign[p.id];
  const where=a?(a==="BOOY"?VEN.BOOY:(state.roomById[a]?dropLabel(a):"배정됨")):"미배정";
  return `${p.name}, ${sex}, ${p.hc}명, ${where}${state.pick===p.id?", 선택됨":""}. `
       + (a?"두 번 누르면 미배정으로 이동":"누르면 선택, 방을 눌러 배정");
}
function chip(p){
  const c=el("div","chip "+(p.partySex==="MIX"?"mix":p.partySex==="M"?"sex-M":p.partySex==="F"?"sex-F":"sex-q"));
  c.dataset.pid=p.id;
  c.setAttribute("role","button"); c.tabIndex=0;                 // keyboard-focusable, button semantics
  c.setAttribute("aria-pressed", state.pick===p.id?"true":"false");
  c.setAttribute("aria-label", ariaForChip(p));
  if(state.locked[p.id]) c.classList.add("locked");
  const room = state.assign[p.id] && state.assign[p.id]!=="BOOY" ? state.roomById[state.assign[p.id]] : null;
  if(room && matchIssue(room,p)) c.classList.add("badmatch");
  const grip=el("span","drag","⠿"); grip.setAttribute("aria-hidden","true"); grip.title="끌어서 이동(드래그)";
  const ci=catInfo(p.cat);
  // slim 1-char category badge (colour carries the rest; the legend + hover decode it) → more room for names
  const cat=el("span","cat", (ci.ab||"-").slice(0,1)); cat.style.background=ci.c; cat.style.color=catText(ci.c); cat.title="분류: "+(p.cat||ci.ab); cat.setAttribute("aria-hidden","true");
  const sx=el("span","sx", p.partySex==="MIX"?"혼":p.partySex==="M"?"남":p.partySex==="F"?"여":"?");
  sx.title="성별: "+(p.partySex==="MIX"?"혼성":p.partySex==="M"?"남성":p.partySex==="F"?"여성":"미상"); sx.setAttribute("aria-hidden","true");
  const nm=el("span","nm", p.name + (p.kname?` (${p.kname})`:""));
  // full name first so a truncated name is recoverable on hover (DESIGN-3)
  nm.title = `${p.name}${p.kname?` (${p.kname})`:""} · ${p.id} · ${p.cat} · ${p.arr}~${p.dep}` + (p.pre?` · 사전:${p.pre}`:"");
  const hc=el("span","hc", p.hc>1?`👪${p.hc}`:"");
  if(p.hc>1) hc.title=`총 ${p.hc}명 (본인 ${p.party.본인}·배우자 ${p.party.배우자}·자녀 ${p.party.자녀}·기타 ${p.party.기타})`;
  const lk=el("span","lk", state.locked[p.id]?"🔒":"🔓");
  lk.setAttribute("role","button"); lk.tabIndex=0;
  lk.setAttribute("aria-pressed", state.locked[p.id]?"true":"false");
  lk.setAttribute("aria-label", (state.locked[p.id]?"잠금 해제":"잠금")+" — "+p.name+" (자동배정 제외)");
  lk.title="잠금 토글(자동배정 제외)";
  const toggleLock=ev=>{ ev.stopPropagation(); state.locked[p.id]=!state.locked[p.id];
    announce(`${p.name} ${state.locked[p.id]?"잠금":"잠금 해제"}`); render(); };
  lk.onclick=toggleLock;
  lk.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggleLock(e); } });
  c.append(grip,cat,sx,nm,hc,lk);
  c.style.cursor="pointer";
  // pointer-drag: from the ⠿ grip (all pointer types) and from the chip body (mouse/pen only,
  // so touch swipes on the body still scroll the list and taps still select).
  grip.addEventListener("pointerdown",e=>{ if(e.button)return; e.preventDefault(); e.stopPropagation(); beginDrag(e,p,c); });
  c.addEventListener("pointerdown",e=>{ if(e.pointerType==="touch"||e.button) return; if(e.target===lk||e.target===grip) return; beginDrag(e,p,c); });
  attachLongPress(c,()=>openCard(p));                  // ⑤ touch: long-press opens detail
  // single-click = pick-up / unassign · double-click = detail modal.
  // The single action is deferred briefly so a 2nd click can cancel it (otherwise render() would
  // destroy the chip on the 1st click and the dblclick could never fire).
  const single=()=>{
    if(state.assign[p.id]){ delete state.assign[p.id]; state.pick=null; render(); announceAssign(`${p.name} 미배정으로 이동`); }   // assigned → back to 미배정
    else {                                                                  // pool → pick up / cancel
      state.pick=(state.pick===p.id?null:p.id);
      announce(state.pick? `${p.name} 선택됨 — 방을 누르면 배정됩니다` : "선택 해제");
      render();
    }
  };
  let ctimer=null;
  c.addEventListener("click",e=>{
    e.stopPropagation(); if(lpFired||dragFired) return;
    if(ctimer) return;                                 // this is the 2nd click → let dblclick handle it
    ctimer=setTimeout(()=>{ ctimer=null; single(); }, 230);
  });
  c.addEventListener("dblclick",e=>{                   // ⑤ detail modal
    e.stopPropagation();
    if(ctimer){ clearTimeout(ctimer); ctimer=null; }   // cancel the pending single action
    openCard(p);
  });
  c.addEventListener("keydown",e=>{                    // keyboard: Enter/Space select, F2/i detail
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); single(); }
    else if(e.key==="F2"){ e.preventDefault(); openCard(p); }
  });
  if(state.assign[p.id]){
    c.title=`${nm.title}\n클릭: 미배정으로 이동 · 더블클릭/길게 누르기: 상세`;
  }else{
    if(state.pick===p.id) c.classList.add("picked");
    c.title=`${nm.title}\n클릭: 선택 후 방을 탭하여 배정 · 더블클릭/길게 누르기: 상세`;
  }
  return c;
}

    const cx=el("button","pickcancel","✕ 취소"); cx.type="button"; cx.setAttribute("aria-label","선택 취소(Esc)");
    cx.onclick=ev=>{ ev.stopPropagation(); state.pick=null; announce("선택 해제"); render(); };

  }

  un.forEach(p=>list.append(chip(p)));

// Register `node` as a drop target. roomKey===null ⇒ pool (unassign).
// Pointer-drag drops are handled globally via data-dropkey; here we wire the
// tap-to-assign + keyboard paths (tap a person, then tap/Enter a room).
function makeDrop(node, roomKey){
  node.dataset.dropkey = roomKey===null ? "__pool__" : roomKey;
  const doDrop=()=>{
    if(!state.pick) return false;
    if(roomKey===null){ state.pick=null; announce("선택 해제"); render(); }   // tap the pool = cancel
    else { applyDrop(state.pick, roomKey); }                                 // applyDrop clears pick + announces
    return true;
  };
  node.addEventListener("click",e=>{ if(doDrop()) e.stopPropagation(); });
  if(roomKey!==null){                                  // rooms double as keyboard drop targets while picking
    node.addEventListener("keydown",e=>{ if((e.key==="Enter"||e.key===" ")&&state.pick){ e.preventDefault(); doDrop(); } });
  }
}

    Object.keys(groups).sort().forEach((gk,gi)=>{
      const fId=`flr-${vi}-${gi}`, fCollapsed=!!state.collapsedRooms[fId];
      const fg=el("div","floorgrp"+(fCollapsed?" collapsed":"")); fg.id=fId;
      const occN=groups[gk].reduce((s,r)=>s+roomLoad(r.key),0);
      const h3=el("h3"); h3.setAttribute("role","button"); h3.tabIndex=0;
      h3.setAttribute("aria-expanded", fCollapsed?"false":"true");
      h3.innerHTML=`<span class="fchev" aria-hidden="true">▼</span><span>${esc(gk)}</span><span class="fcount">${groups[gk].length}실 · ${occN}명</span>`;
      const tog=()=>{ state.collapsedRooms[fId]=!fCollapsed; saveUI(); renderVenues(); };
      h3.addEventListener("click",tog);
      h3.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();tog();} });

      groups[gk].sort((a,b)=> (a.rno||"").localeCompare(b.rno||"",undefined,{numeric:true}) || a.id.localeCompare(b.id))

function roomCard(r){
  const load=roomLoad(r.key);
  const card=el("div","room"+(load>r.total?" over":""));
  card.tabIndex=0; card.setAttribute("role","group");
  card.setAttribute("aria-label",`${r.rno||r.id}호, ${r.gender||"성별 미지정"}${r.ondol?", 온돌":""}, ${load}/${r.total}명${load>r.total?", 정원 초과":""}. 선택한 인원을 여기에 배정하려면 누르세요`);
  const hdr=el("div","rhdr");
  const left=el("span"); left.innerHTML=`<span class="rno">${r.rno||r.id}</span>`;
  const tags=el("span","tags");
  if(r.gender==="Male")tags.append(el("span","tag M","남"));
  if(r.gender==="Female")tags.append(el("span","tag F","여"));
  if(r.gender==="Staff")tags.append(el("span","tag staff","Staff"));
  if(r.ondol)tags.append(el("span","tag ondol","온돌"));
  left.append(" ");
  const cls = load>r.total?"over":load===r.total?"full":"ok";
  const cap=el("span","capbadge "+cls,`${load}/${r.total}`);
  hdr.append(left,tags,cap);
  card.append(hdr);
  card.title=`${r.type||""} ${r.gender||"미지정"} 기준${r.base}+추가${r.ext}=${r.total}`+(r.note?` · ${r.note}`:"");
  roomOccupants(r.key).forEach(p=>card.append(chip(p)));
  makeDrop(card,r.key);
  return card;
}

// shared warning computation — used by both the panel and the top warning badge (DESIGN-5)
function computeIssues(){
  const issues=[];
  const roomLabel=k=> k==="BOOY"?VEN.BOOY : (state.roomById[k]?`${state.roomById[k].rno||state.roomById[k].id}호`:k);
  state.rooms.forEach(r=>{ const l=roomLoad(r.key); if(l>r.total) issues.push(`정원 초과 — ${r.hotel} ${r.rno||r.id}호: 정원 ${r.total}명인데 ${l}명이 배정되어 ${l-r.total}명 초과되었습니다.`); });
  state.parties.forEach(p=>{
    const a=state.assign[p.id]; if(!a||a==="BOOY") return;
    const rm=state.roomById[a]; if(!rm) return;
    const iss=matchIssue(rm,p);
    if(iss && iss!=="정원 초과") issues.push(`${iss} — ${p.name} 님이 조건이 맞지 않는 ${rm.hotel} ${rm.rno||rm.id}호에 배정되어 있습니다.`);
  });
  // split groups across rooms (한 묶음으로 같이 묵어야 하는 그룹이 여러 방에 흩어진 경우)
  const groupRooms={};
  state.parties.forEach(p=>{ if(!p.group) return; const a=state.assign[p.id]; if(!a) return; (groupRooms[p.group]=groupRooms[p.group]||new Set()).add(a); });
  Object.keys(groupRooms).forEach(g=>{ const set=groupRooms[g]; if(set.size>1){
    const labels=[...set].map(roomLabel).join(", ");
    issues.push(`묶음 분리 — '${g}' 그룹은 한 방에 함께 배정해야 하지만, 현재 ${set.size}개 방(${labels})에 나뉘어 있습니다. 같은 방(또는 인접 방)으로 모아주세요.`);
  }});
  return issues;
}
// jump to the warning panel (switch to rooms view first if needed), then flash it
function jumpToWarnings(){
  if(state.view!=="rooms") setView("rooms");
  requestAnimationFrame(()=>{ const w=$("#warnpanel"); if(!w) return;
    w.scrollIntoView({behavior:"smooth",block:"end"});
    w.classList.add("flash"); setTimeout(()=>w.classList.remove("flash"),1200);
  });
}
function renderWarnings(){
  const wp=$("#warnpanel"); wp.innerHTML="";
  const issues=computeIssues();
  const un=state.parties.filter(p=>p.need!=="No"&&!state.assign[p.id]).reduce((s,p)=>s+p.hc,0);
  const wh=el("h3");

function venShort(hotel){ return hotel===VEN.BYYTC?"부영청소년":hotel===VEN.YOUUS?"유어스":hotel===VEN.BOOY?"부영호텔":hotel; }
function partyRoomInfo(p){
  const a=state.assign[p.id];
  if(a==="BOOY") return {ven:VEN.BOOY, vshort:"부영호텔", rno:"팀룸", full:VEN.BOOY+" (팀룸)", cap:null};
  if(a){ const rm=state.roomById[a]; if(rm){
    const full=(rm.bldg?rm.bldg+"동 ":"")+(rm.floor?rm.floor+" ":"")+(rm.rno||rm.id)+(rm.type?" ("+rm.type+")":"");
    return {ven:rm.hotel, vshort:venShort(rm.hotel), rno:(rm.rno||rm.id), full, cap:rm.total};
  }}
  return {ven:null, vshort:"미배정", rno:"미배정", full:"미배정", cap:null};
}
function computeDups(){                       // flag rows sharing a name or email (duplicate participant)
  const byName={}, byEmail={}; state.dupInfo={};
  state.parties.forEach(p=>{
    const nk=(p.name||"").trim().toUpperCase(); if(nk){(byName[nk]=byName[nk]||[]).push(p.id);}
    const ek=(p.email||"").trim().toLowerCase(); if(ek){(byEmail[ek]=byEmail[ek]||[]).push(p.id);}
  });
  const add=ids=>{ if(ids.length>1) ids.forEach(id=>{
    const others=ids.filter(x=>x!==id);
    state.dupInfo[id]=Array.from(new Set([...(state.dupInfo[id]||[]),...others]));
  }); };
  Object.values(byName).forEach(add); Object.values(byEmail).forEach(add);
  state.dups=new Set(Object.keys(state.dupInfo));
}
function applyColW(){

  // on phones, cap the meta columns so the frozen ID·분류·이름 pane doesn't swallow the screen
  const w = mobile ? state.colW.map((x,i)=>Math.min(x,[44,44,96,56,60,40][i])) : state.colW;
  const tl=$("#timeline");
  tl.style.setProperty("--tlcols", w.map(x=>x+"px").join(" ")+` minmax(${floor}px,1fr)`);
  tl.style.setProperty("--c1", w[0]+"px");             // frozen-pane left offsets (ID·분류·이름 sticky-left)
  tl.style.setProperty("--c2", (w[0]+w[1])+"px");
}

function makeColGrip(ci){
  const g=el("div","colgrip");

    ev.preventDefault(); ev.stopPropagation();
    const x0=ev.clientX, w0=state.colW[ci]; g.classList.add("drag");

  });

function renderTimeline(){

  // DESIGN-6: trim unused buffer columns on the right — render only through the last used night (+1),
  // so the empty far-right days (7/5–7/8) don't waste horizontal space when nobody stays that long.
  const Dfull=state.dates;
  let usedEnd=state.nightCols.length-1;
  state.parties.forEach(p=>{ if(p.stay) usedEnd=Math.max(usedEnd,p.stay.e); });
  const showN=Math.min(Dfull.length, Math.max(state.nightCols.length+1, usedEnd+2));
  const D=Dfull.slice(0,showN); const n=D.length;
  const off629 = D.indexOf("6월29일");                        // first official (arrival) night
  const off630 = D.indexOf("6월30일");                        // conference start (event-day highlight)
  const planEnd = state.nightCols.length;                     // index where buffer (연장) zone starts
  // header (ID + 참가자 + date axis)
  const head=$("#tlhead"); head.innerHTML=""; head.style.setProperty("--ncols",n);
  applyColW();
  ["ID","분류","이름 / 팀","호텔","객실번호","수용"].forEach((t,ci)=>{
    const lbl=el("div","lbl"+(ci===2?"":" ctr"),t); lbl.append(makeColGrip(ci)); head.append(lbl);
  });
  const hn=el("div","nights");
  D.forEach((lab,i)=>{
    let cls = (off629>=0&&i<off629)?"unofficial":(i>=planEnd?"buffer":null);
    if(!cls && off630>=0 && i>=off630) cls="event"+(i===off630?" evstart":"");   // conference days (DESIGN-6)
    hn.append(el("div",cls,lab.replace("월","/").replace("일","")));
  });
  head.append(hn);
  // filter
  const f=state.tlFilter;
  let rows=state.parties.filter(p=>{
    if(f.q){ const q=f.q.toLowerCase(); if(!(p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||(p.kname||"").toLowerCase().includes(q))) return false; }
    if(f.venue && partyVenue(p)!==f.venue) return false;
    if(f.cat && p.cat!==f.cat) return false;
    return true;
  });
  $("#tlcount").textContent=`${rows.length}명 표시`;
  // narrow screens: swap the wide gantt grid for a per-person card list
  const narrow = window.innerWidth<=560;

  // ② group by hotel (horizontal split) · ⑤ foldable · custom vertical order
  const order=[VEN.BYYTC,VEN.YOUUS,VEN.BOOY,"(미배정)"];
  const groups={}; rows.forEach(p=>{ const v=partyVenue(p); (groups[v]=groups[v]||[]).push(p); });
  const pos={}; state.orderList.forEach((id,i)=>pos[id]=i);
  let shown=0; const CAP=500;
  order.forEach(v=>{
    const list=groups[v]; if(!list||!list.length) return;
    list.sort((a,b)=> (pos[a.id]??1e9)-(pos[b.id]??1e9));
    const people=list.reduce((s,p)=>s+p.hc,0);
    const vc = v===VEN.BYYTC?"byytc":v===VEN.YOUUS?"youus":v===VEN.BOOY?"booyoung":"unassigned";

// vertical reorder + cross-hotel move ---------------------------------
function tlReorder(srcId,tgtId,after){
  const L=state.orderList, si=L.indexOf(srcId); if(si<0) return;
  L.splice(si,1); let ti=L.indexOf(tgtId); if(ti<0) ti=L.length-1;
  L.splice(after?ti+1:ti,0,srcId);

function assignToHotel(p,hotel){
  if(hotel==="(미배정)"){ delete state.assign[p.id]; return; }
  if(hotel===VEN.BOOY){ state.assign[p.id]="BOOY"; return; }
  let cands=state.rooms.filter(rm=>rm.hotel===hotel && compatible(rm,p));
  if(!cands.length){ toast(`${hotel}에 ${p.name} 배치 가능한 방이 없습니다 (성별/정원).`,"warn"); return; }
  cands.sort((a,b)=>(a.total-(roomLoad(a.key)+p.hc))-(b.total-(roomLoad(b.key)+p.hc)));
  state.assign[p.id]=cands[0].key;
}
function tlRow(p,n,off629,planEnd){

    try{ grip.setPointerCapture(ev.pointerId); }catch(e){}

function enableBarDrag(p,bar,hl,hr,track,n,place){
  const start=ev=>{
    ev.preventDefault();
    const mode = ev.target===hl?"L":ev.target===hr?"R":"M";
    const rect=track.getBoundingClientRect(); const cw=rect.width/n;
    const s0=p.stay.s, e0=p.stay.e, x0=ev.clientX;
    const move=e=>{
      const d=Math.round((e.clientX-x0)/cw);

      if(mode==="L") s=Math.min(Math.max(0,s0+d),e0);
      else if(mode==="R") e2=Math.max(Math.min(n-1,e0+d),s0);
      else { let sh=d; if(s0+sh<0)sh=-s0; if(e0+sh>n-1)sh=n-1-e0; s=s0+sh; e2=e0+sh; }
      p.stay.s=s; p.stay.e=e2; place();
    };
    const up=()=>{ document.removeEventListener("pointermove",move); document.removeEventListener("pointerup",up);
      refreshStay(p); renderStats(); };
    document.addEventListener("pointermove",move); document.addEventListener("pointerup",up);
  };
  bar.addEventListener("pointerdown",start);
}

function saveCard(p){
  const card=$("#card");
  const val=k=>{ const elx=card.querySelector(`[data-f="${k}"]`); return elx?elx.value:undefined; };
  const before={}; Object.keys(FIELD_HDR).forEach(k=>before[k]=p[k]??"");
  const bparty={...p.party};
  // text/detail fields
  ["name","kname","dob","nat","email","aff","title","wb","pay","team","group","pre","companions","note"].forEach(k=>{ const v=val(k); if(v!==undefined) p[k]=v.trim(); });
  p.sex=val("sex")||"?";
  p.cat=(val("cat")||"").trim();
  p.need=val("need")||"Yes";
  // headcount breakdown → recompute hc (총인원 is derived)
  ["본인","배우자","자녀","기타"].forEach(k=>{ p.party[k]=Math.max(0,parseInt(val(k),10)||0); });
  p.partySum=p.party.본인+p.party.배우자+p.party.자녀+p.party.기타;
  p.hc=p.partySum>0?p.partySum:1;
  const isMulti = p.hc>1 || p.party.배우자>0 || p.party.자녀>0 || p.party.기타>0;
  p.partySex = isMulti?"MIX":(p.sex==="M"?"M":p.sex==="F"?"F":"?");
  // stay span
  const sv=val("stayS");
  if(sv===""||sv==null){ p.stay=null; }
  else { let s=+sv, e=+val("stayE"); if(isNaN(e)||e<s) e=s; p.stay={s,e}; }
  refreshStay(p);
  // assignment
  const ven=val("venue"); const room=val("room");
  if(!ven){ delete state.assign[p.id]; }
  else if(ven===VEN.BOOY){ state.assign[p.id]="BOOY"; }
  else if(room){ state.assign[p.id]=room; }
  else { assignToHotel(p,ven); }   // no specific room → auto-pick
  // record which master columns the user actually changed (surgical export)
  p._edits=p._edits||new Set();
  Object.entries(FIELD_HDR).forEach(([k,h])=>{ if(String(p[k]??"")!==String(before[k])) p._edits.add(h); });
  ["본인","배우자","자녀","기타"].forEach(k=>{ if((p.party[k]||0)!==(bparty[k]||0)) p._edits.add(k); });
  state.edited=true;
  render();
  openCard(p);
}
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ---------- export updated MASTER (versioned) ---------- */
function bumpMasterName(name){
  const stem=(name||"ICMDA Master Data.xlsx").replace(/\.xlsx$/i,"");
  const m=/^(.*?)v\s*(\d+)\s*$/i.exec(stem);
  return m ? `${m[1]}v${(+m[2])+1}.xlsx` : `${stem} v2.xlsx`;
}
function xCell(ws,r,c){ const x=ws[XLSX.utils.encode_cell({r,c})]; return x?x.v:null; }
function xSet(ws,r,c,v,t){
  const addr=XLSX.utils.encode_cell({r,c});
  if(v===""||v==null){ delete ws[addr]; return; }
  ws[addr]={t:t||(typeof v==="number"?"n":"s"),v};
}
function exportMaster(){
  if(!state.masterBuf){ toast("먼저 ① 마스터 파일을 여세요.","warn"); return; }
  const wb=XLSX.read(state.masterBuf,{type:"array",cellFormula:true,cellStyles:true});  // fresh copy from original
  const ws=wb.Sheets["참가자"]; const H=state.pH; const HR=1;     // header row = 2nd row
  const range=XLSX.utils.decode_range(ws['!ref']);
  // add room-detail columns at the right
  let c=range.e.c+1; const NC={동:c++,층:c++,호실:c++,객실ID:c++};
  xSet(ws,HR,NC.동,"배정동"); xSet(ws,HR,NC.층,"배정층"); xSet(ws,HR,NC.호실,"배정호실"); xSet(ws,HR,NC.객실ID,"배정객실ID");
  const nrm=v=>v==null?"":String(v).trim();
  const offN=state.nightCols.indexOf("6월29일");
  let changed=0; const beyond=[];
  state.parties.forEach(p=>{
    const r=p._row, ed=p._edits||new Set();
    // detail fields — write only what the user edited in the modal
    Object.entries(FIELD_HDR).forEach(([k,h])=>{ if(ed.has(h)&&H[h]!=null){ xSet(ws,r,H[h],nrm(p[k])); changed++; } });
    ["본인","배우자","자녀","기타"].forEach(k=>{ if(ed.has(k)&&H[k]!=null){ xSet(ws,r,H[k],p.party[k]||0,"n"); changed++; } });
    // assignment → 배정숙소 (venue) + room-detail columns
    const a=state.assign[p.id];
    if(a){
      const ven=partyVenue(p);
      if(H["배정숙소"]!=null && nrm(ven)!==nrm(xCell(ws,r,H["배정숙소"]))){ xSet(ws,r,H["배정숙소"],ven); changed++; }
      let bd="",fl="",rn="",rid="";
      if(a==="BOOY"){ rid="개별예약(부영호텔)"; }
      else if(state.roomById[a]){ const rm=state.roomById[a]; bd=rm.bldg||""; fl=rm.floor||""; rn=rm.rno||rm.id; rid=rm.id; }
      xSet(ws,r,NC.동,bd); xSet(ws,r,NC.층,fl); xSet(ws,r,NC.호실,rn); xSet(ws,r,NC.객실ID,rid);
    }
    // stay → night columns (surgical: only if span changed). 도착일/출발일/숙박일수 are formulas → untouched.
    const os=p._os, ns=p.stay;
    const stayChanged=(!!os!==!!ns)||(os&&ns&&(os.s!==ns.s||os.e!==ns.e));
    if(stayChanged){
      state.nightIdx.forEach((o,k)=>{
        let mark=""; if(ns&&k>=ns.s&&k<=ns.e) mark=(offN>=0&&k<offN)?"✓*":"✓";
        xSet(ws,r,o.i,mark);
      });
      if(ns&&ns.e>=state.nightCols.length) beyond.push(`${p.name}(${p.id})`);
      changed++;
    }
  });
  range.e.c=Math.max(range.e.c,NC.객실ID); ws['!ref']=XLSX.utils.encode_range(range);
  const outName=bumpMasterName(state.masterName);
  XLSX.writeFile(wb,outName);
  let msg=`'${outName}' 저장 완료 — 변경 ${changed}건.\n· 배정동/배정층/배정호실/배정객실ID 열을 추가했습니다.\n· 총인원·도착일·출발일·숙박일수는 수식이라 그대로 두었습니다.`;
  if(beyond.length) msg+=`\n\n⚠ 마스터 박 범위를 벗어난 연장 숙박은 기록할 칸이 없어 누락: ${beyond.join(", ")}`;
  msg+=`\n\n※ 버전 규칙: 이전 파일은 history/ 폴더로 옮기고 기록하세요(브라우저에서 자동 이동 불가). 셀 서식/색상은 보존되지 않을 수 있습니다.`;
  toast(`마스터 내보내기 완료 — '${outName}' (변경 ${changed}건)`,"ok",5000);
  dialog({title:"마스터 내보내기 완료", body:msg});   // detail (version rule + any warnings) in a dismissible dialog
}

        tr.append(el("td",null,String(r.total)));
        tr.append(el("td",null,String(roomLoad(r.key))));
        tr.append(el("td",null, occ.map(o=>`${o.name}${o.hc>1?`(${o.hc})`:""}${o.arr?` [${o.arr}~${o.dep}]`:""}`).join(" · ")||"—"));
        t.append(tr);
      });

  const booy=state.parties.filter(p=>state.assign[p.id]==="BOOY");

    booy.sort((a,b)=>a.name.localeCompare(b.name)).forEach(p=>{
      const tr=el("tr"); tr.append(el("td",null,p.name),el("td",null,String(p.hc)),el("td",null,`${p.arr}~${p.dep}`),el("td",null,p.note||""));
      t.append(tr);
    });
    g.append(t); pa.append(g);
  }
}

// shared action handlers (reused by desktop toolbar, mobile bar, and 더보기 sheet)
// run `fn` behind the spinner (after a paint tick); toast + log any error, always hide.
function withLoading(label, fn){
  const o=$("#loading"), t=$("#loadtxt"); if(t) t.textContent=label||"처리 중…";
  o.style.display="flex";
  setTimeout(()=>{
    try{ fn(); }
    catch(err){ console.error(err); toast("오류: "+((err&&err.message)||err),"err",6000); }
    finally{ o.style.display="none"; if(t) t.textContent="자동 배정 중…"; }
  },30);
}
function runAuto(){                                // spinner, then run (let the browser paint first)
  $("#loading").style.display="flex";
  setTimeout(()=>{ try{ autoAssign(); announceAssign("자동 배정 완료"); toast("자동 배정 완료","ok"); } finally{ $("#loading").style.display="none"; } },30);
}
// auto-assign is destructive (it clears + re-packs every unlocked person) → confirm with an impact summary
function confirmAuto(){
  const need=p=>p.need!=="No";
  const un=state.parties.filter(p=>need(p)&&!state.locked[p.id]&&!state.assign[p.id]).reduce((s,p)=>s+p.hc,0);
  const movable=state.parties.filter(p=>need(p)&&!state.locked[p.id]&&state.assign[p.id]&&state.assign[p.id]!=="BOOY").reduce((s,p)=>s+p.hc,0);
  dialog({title:"② 자동 배정", danger:true, okText:"자동 배정 실행",
    body:`성별·정원·온돌·묶음 규칙에 따라 미배정 ${un}명을 방에 배치합니다.\n`
        +`잠기지 않은 기존 배정 ${movable}명도 재배치될 수 있습니다. (🔒 잠긴 인원은 그대로)\n\n계속할까요?`,
    onOk:runAuto});
}
// master export has real side effects (version bump, files to move) → confirm first
function confirmMaster(){
  if(!state.masterBuf){ toast("먼저 ① 마스터 파일을 여세요.","warn"); return; }
  const assigned=state.parties.filter(p=>p.need!=="No"&&state.assign[p.id]).reduce((s,p)=>s+p.hc,0);
  dialog({title:"마스터 내보내기", okText:"내보내기",
    body:`배정 결과(배정숙소·배정동/층/호실)를 원본 마스터에 반영해 새 버전(v{N})으로 저장합니다.\n`
        +`현재 배정 ${assigned}명. 수식 열(총인원·도착일·출발일·숙박일수)은 그대로 둡니다.\n\n계속할까요?`,
    onOk:()=>withLoading("마스터 내보내는 중…",exportMaster)});
}
function doPrint(){ buildPrint(); window.print(); }
function onMasterFile(e){
  const f=e.target.files[0]; if(!f) return;
  $("#srcname").textContent=f.name; state.masterName=f.name;
  const rd=new FileReader();
  rd.onload=()=>withLoading("마스터 불러오는 중…",()=>loadMaster(rd.result));   // XLSX.read can throw on a bad file
  rd.onerror=()=>toast("파일을 읽지 못했습니다.","err");
  rd.readAsArrayBuffer(f);
  e.target.value="";                              // allow re-picking the same file
}
function onJsonFile(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const text=rd.result;
    const go=()=>{ loadJson(text); closeSheet(); };
    // loading JSON over existing work overwrites it → confirm first
    if(Object.keys(state.assign).length){
      dialog({title:"진행 불러오기", danger:true, okText:"불러오기(덮어쓰기)",
        body:"현재 배정 작업을 불러온 파일 내용으로 덮어씁니다.\n저장하지 않은 변경사항은 사라집니다.\n\n계속할까요?",
        onOk:go});
    } else go();
  };
  rd.onerror=()=>toast("파일을 읽지 못했습니다.","err");
  rd.readAsText(f);
  e.target.value="";
}
// desktop toolbar
$("#fileMaster").addEventListener("change",onMasterFile);
$("#fileJson").addEventListener("change",onJsonFile);
$("#btnAuto").onclick=confirmAuto;
$("#btnExcel").onclick=()=>withLoading("Excel 저장 중…",exportExcel);
$("#btnMaster").onclick=confirmMaster;
$("#btnJson").onclick=saveJson;
$("#btnPrint").onclick=doPrint;
// mobile bottom bar
$("#mbFileMaster").addEventListener("change",onMasterFile);
$("#mbAuto").onclick=confirmAuto;
$("#mbMore").onclick=openSheet;
// 더보기 bottom sheet
function openSheet(){ $("#sheet").hidden=false; $("#mbMore").setAttribute("aria-expanded","true"); }
function closeSheet(){ $("#sheet").hidden=true; $("#mbMore").setAttribute("aria-expanded","false"); }
$("#sheet").addEventListener("click",e=>{ if(e.target.id==="sheet") closeSheet(); });   // tap backdrop to dismiss
$("#shExcel").onclick=()=>{ closeSheet(); withLoading("Excel 저장 중…",exportExcel); };
$("#shMaster").onclick=()=>{ closeSheet(); confirmMaster(); };
$("#shJson").onclick=()=>{ closeSheet(); saveJson(); };
$("#shPrint").onclick=()=>{ closeSheet(); doPrint(); };
$("#shFileJson").addEventListener("change",onJsonFile);

// search: live filter + clear (×) button (shows when non-empty)
function wireSearchClear(inputSel, clrSel, onChange){
  const inp=$(inputSel), clr=$(clrSel);
  const sync=()=>clr.classList.toggle("show", !!inp.value);
  inp.addEventListener("input",()=>{ sync(); onChange(); });
  clr.addEventListener("click",()=>{ inp.value=""; sync(); onChange(); inp.focus(); });
  sync();
}
wireSearchClear("#poolsearch","#poolsearchclr",renderPool);
wireSearchClear("#tlsearch","#tlsearchclr",()=>{ state.tlFilter.q=$("#tlsearch").value; renderTimeline(); });

// mobile jump-to-floor: expand the target accordion, then smooth-scroll to it
$("#jumpsel").addEventListener("change",e=>{
  const id=e.target.value; e.target.selectedIndex=0; if(!id) return;
  delete state.collapsedRooms[id];
  if(id.indexOf("flr-")===0){ const vi=id.split("-")[1]; delete state.collapsedRooms["ven-"+vi]; }  // also open its venue
  renderVenues();
  requestAnimationFrame(()=>{ const n=document.getElementById(id); if(n) n.scrollIntoView({behavior:"smooth",block:"start"}); });
});

// view tabs + timeline filters + modal
$("#tabRooms").onclick=()=>setView("rooms");
$("#tabTimeline").onclick=()=>setView("timeline");
$("#tlvenue").addEventListener("change",e=>{ state.tlFilter.venue=e.target.value; renderTimeline(); });
$("#tlcat").addEventListener("change",e=>{ state.tlFilter.cat=e.target.value; renderTimeline(); });
$("#modal").addEventListener("click",e=>{ if(e.target.id==="modal") closeCard(); });

// Esc: dismiss the sheet, else clear a tap-to-assign selection, else close the modal
document.addEventListener("keydown",e=>{
  if(e.key!=="Escape") return;
  if(!$("#sheet").hidden){ closeSheet(); return; }
  if(state.pick){ state.pick=null; announce("선택 해제"); render(); return; }
  closeCard();
});
// tapping empty space deselects a picked person (chips/rooms have their own handlers)
document.addEventListener("click",e=>{
  if(!state.pick) return;
  if(e.target.closest(".chip,.room,#poollist,.pickhint,.vtab,#mobilebar,#jumpbar,#sheet,.venue>h2,.floorgrp>h3")) return;
  state.pick=null; announce("선택 해제"); render();
});

// edge-fade affordances for horizontal scrollers (gantt + mobile statsbar)
function updateFades(scrollerSel, wrapSel){
  const sc=$(scrollerSel), wp=$(wrapSel); if(!sc||!wp) return;
  const max=sc.scrollWidth-sc.clientWidth;
  wp.classList.toggle("fade-l", sc.scrollLeft>2);
  wp.classList.toggle("fade-r", max>2 && sc.scrollLeft<max-2);
}
function updateGanttFades(){     // right fade only — a left fade would cover the frozen ID/이름 pane
  const sc=$("#gantt"), wp=$("#ganttwrap"); if(!sc||!wp) return;
  const max=sc.scrollWidth-sc.clientWidth;
  wp.classList.remove("fade-l");
  wp.classList.toggle("fade-r", max>2 && sc.scrollLeft<max-2);
}
function updateStatsFades(){ updateFades("#statsbar","#statsbarwrap"); }
$("#gantt").addEventListener("scroll",updateGanttFades,{passive:true});
$("#statsbar").addEventListener("scroll",updateStatsFades,{passive:true});

loadUI();   // restore column widths, collapsed groups, and last view
buildLegend();   // static category key (DESIGN-4)
let _rsT=null;
window.addEventListener("resize",()=>{
  syncTop(); updateGanttFades(); updateStatsFades();
  // debounced timeline re-render so the gantt↔card threshold (560px) is honoured on rotate/resize
  if(state.view==="timeline"){ clearTimeout(_rsT); _rsT=setTimeout(renderTimeline,150); }
});
syncTop();
</script>
</body>
